<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="text-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado escuro -->
  <rect width="32" height="32" rx="8" fill="#0d0a1e"/>

  <!-- Borda com gradiente rosa -->
  <rect width="32" height="32" rx="8" fill="none" stroke="url(#g)" stroke-width="1.5"/>

  <!-- Círculo de destaque central -->
  <circle cx="16" cy="16" r="10" fill="url(#g)" opacity="0.15"/>

  <!-- Letra C centralizada -->
  <text
    x="16"
    y="21"
    font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
    font-size="17"
    font-weight="700"
    text-anchor="middle"
    fill="url(#g)"
    letter-spacing="-0.5"
  >C</text>
</svg>
